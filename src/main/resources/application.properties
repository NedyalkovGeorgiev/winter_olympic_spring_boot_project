spring.application.name=winter.olympic.spring.boot.project

# Database Configuration
spring.datasource.username=education_user
spring.datasource.password=education_user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/winter_olympics_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# Hibernate & JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
